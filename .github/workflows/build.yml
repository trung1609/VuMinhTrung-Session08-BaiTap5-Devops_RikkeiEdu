name: Optimized CI/CD Pipeline

on:
  push:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: mvn clean test

  build_and_push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USER }}" --password-stdin


      - name: Build and Push Docker Image with Short SHA
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          IMAGE_NAME="${{ secrets.DOCKER_HUB_USER }}/user-service"
          
          echo "Building image with tag: $SHORT_SHA"
          docker build -t $IMAGE_NAME:$SHORT_SHA .
          
          echo "Pushing image to Docker Hub..."
          docker push $IMAGE_NAME:$SHORT_SHA